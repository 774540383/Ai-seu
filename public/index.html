<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مساعد SEU الذكي</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f4f6f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { max-width: 700px; width: 100%; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #1e3a8a; text-align: center; border-bottom: 2px solid #e5e7eb; padding-bottom: 15px; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; color: #1e293b; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 14px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        .status { margin-top: 15px; padding: 12px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
        .chat-area { margin-top: 30px; border-top: 2px solid #e5e7eb; padding-top: 20px; display: none; }
        #chatBox { background: #f8fafc; height: 200px; overflow-y: auto; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; margin-bottom: 12px; }
        .input-group { display: flex; gap: 10px; }
        .input-group input { flex: 1; }
        .input-group button { width: auto; padding: 12px 25px; }
        .quick-actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
        .quick-actions button { width: auto; background: #e2e8f0; color: #1e293b; padding: 8px 16px; font-size: 14px; border: none; border-radius: 30px; cursor: pointer; }
        .quick-actions button:hover { background: #cbd5e1; }
        .status-on { background: #d1fae5; color: #065f46; }
        .status-off { background: #fee2e2; color: #991b1b; }
        .status-wait { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
<div class="container">
    <h2>🎓 المساعد الذكي لطلاب SEU</h2>
    <div id="loginForm">
        <div class="form-group">
            <label>📘 الرقم الجامعي (مثال: S12345678)</label>
            <input type="text" id="username" placeholder="أدخل الرقم الجامعي">
        </div>
        <div class="form-group">
            <label>🔑 كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>
        <button onclick="startSync()">🔄 تسجيل الدخول ومزامنة الأنظمة</button>
        <div id="statusBox" class="status"></div>
    </div>

    <div class="chat-area" id="chatSection">
        <h3 style="margin-bottom:12px;">💬 اسأل المساعد عن حسابك:</h3>
        <div id="chatBox"></div>
        <div class="input-group">
            <input type="text" id="questionInput" placeholder="مثال: كم معدلي؟ أو هل لدي واجبات؟">
            <button onclick="askAssistant()">إرسال</button>
        </div>
        <div class="quick-actions">
            <button onclick="quickAsk('اعطيني معدلي')">📊 المعدل</button>
            <button onclick="quickAsk('عرض الواجبات')">📋 الواجبات</button>
            <button onclick="quickAsk('المقررات الدراسية')">📚 المقررات</button>
            <button onclick="quickAsk('الإعلانات الجديدة')">📢 الإعلانات</button>
            <button onclick="startSync()" style="background:#059669; color:white;">🔄 مزامنة جديدة</button>
        </div>
    </div>
</div>

<script>
    let currentUser = "";

    async function startSync() {
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value.trim();
        const status = document.getElementById('statusBox');
        if (!user || !pass) { alert("الرجاء إدخال الرقم الجامعي وكلمة المرور."); return; }
        currentUser = user;
        status.style.display = 'block';
        status.className = 'status status-wait';
        status.innerText = "⏳ جاري الاتصال بأنظمة الجامعة وسحب البيانات... (قد يستغرق 30-60 ثانية)";
        try {
            const res = await fetch('/api/sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: user, password: pass })
            });
            const data = await res.json();
            if (res.ok && data.success) {
                status.className = 'status status-on';
                status.innerText = "✅ " + data.message + " الآن يمكنك طرح الأسئلة.";
                document.getElementById('chatSection').style.display = 'block';
                document.getElementById('chatBox').innerHTML = '<div style="color:#1e3a8a;">🤖 تم تحديث بياناتك. اسألني أي شيء عن درجاتك وواجباتك.</div>';
            } else {
                status.className = 'status status-off';
                status.innerText = "❌ خطأ: " + (data.error || "فشل غير معروف");
            }
        } catch(e) {
            status.className = 'status status-off';
            status.innerText = "❌ فشل الاتصال بالخادم. تأكد من أن الخادم يعمل.";
        }
    }

    async function askAssistant() {
        const input = document.getElementById('questionInput');
        const q = input.value.trim();
        if (!q) return;
        if (!currentUser) { alert("يرجى المزامنة أولاً."); return; }
        const box = document.getElementById('chatBox');
        box.innerHTML += `<p><b>👤 أنت:</b> ${q}</p>`;
        input.value = '';
        try {
            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: currentUser, question: q })
            });
            const data = await res.json();
            box.innerHTML += `<p style="color:#1e3a8a;"><b>🤖 المساعد:</b> ${data.reply}</p>`;
        } catch(e) {
            box.innerHTML += `<p style="color:red;">❌ خطأ في الاتصال بالخادم.</p>`;
        }
        box.scrollTop = box.scrollHeight;
    }

    function quickAsk(question) {
        document.getElementById('questionInput').value = question;
        askAssistant();
    }
</script>
</body>
</html>
